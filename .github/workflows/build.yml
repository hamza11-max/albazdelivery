name: Desktop Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      flavor:
        description: "Vertical flavor (one codebase). Use 'all' for restaurant+retail+grocery sequentially."
        required: true
        default: restaurant
        type: choice
        options:
          - restaurant
          - retail
          - grocery
          - other
          - all

jobs:
  build-and-publish-win:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Vendor app type checking
        run: npm run type-check:vendor

      - name: Build Windows desktop (flavored pack + publish)
        shell: pwsh
        run: |
          $event = $env:GITHUB_EVENT_NAME
          if ($event -eq 'workflow_dispatch') {
            $f = '${{ github.event.inputs.flavor }}'
          } else {
            $f = 'restaurant'
          }
          if ([string]::IsNullOrWhiteSpace($f)) { $f = 'restaurant' }
          if ($f -eq 'all') {
            npm run build:vendor:desktop:all-verticals
          } else {
            npm run "electron:build:win:$f" -w @albaz/vendor
          }
